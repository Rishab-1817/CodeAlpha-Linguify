<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguify - Language Translator</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-language"></i> Linguify</h1>
            <p>Translate text seamlessly across multiple languages</p>
        </header>

        <div class="translator-box">
            <div class="panel source-panel">
                <div class="control-row">
                    <select id="source-lang">
                        <option value="auto" selected>Detect Language</option>
                        </select>
                </div>
                <textarea id="source-text" placeholder="Type something to translate..."></textarea>
                <div class="panel-footer">
                    <span id="char-count">0 / 5000</span>
                    <button id="clear-btn" title="Clear text"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>

            <div class="swap-container">
                <button id="swap-langs-btn" title="Swap languages">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>

            <div class="panel target-panel">
                <div class="control-row">
                    <select id="target-lang">
                        </select>
                </div>
                <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
                <div class="panel-footer">
                    <button id="copy-btn" title="Copy translation"><i class="fa-solid fa-copy"></i></button>
                    <span id="copy-status" class="hidden">Copied!</span>
                </div>
            </div>
        </div>

        <div class="action-container">
            <button id="translate-btn">Translate</button>
        </div>
        
        <div id="error-message" class="error-container hidden">
            <i class="fa-solid fa-triangle-exclamation"></i> <span id="error-text">An error occurred</span>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
