<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translator</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        #output { margin-top: 20px; padding: 10px; background: #f4f4f4; border-left: 5px solid #007bff; }
    </style>
</head>
<body>
    <h2>CodeAlpha Linguify - Translator</h2>
    <textarea id="text" placeholder="Type text to translate..."></textarea>
    <button onclick="translateText()">Translate</button>
    <div id="output">Translation will appear here...</div>

    <script>
        async function translateText() {
            const text = document.getElementById('text').value;
            // Adjust this fetch call to match whatever your actual translation endpoint is (e.g., /translate)
            const response = await fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, target_lang: 'es' }) 
            });
            const data = await response.json();
            document.getElementById('output').innerText = data.translated_text || JSON.stringify(data);
        }
    </script>
</body>
</html>
